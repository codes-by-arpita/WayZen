{% extends "layout.html" %}
{% block title %}Login to WayZen{% endblock %}
{% block css %}<link rel="stylesheet" href="{{url_for('static',filename='css/auth.css')}}">{% endblock %}
{% block body %}
    <div class="overlay">
        <div class="Login">
            <div class="logo">
                <img src="{{url_for('static',filename='assets/WeyZen_icon.png')}}" alt="WayZen logo">
                <span class="name">WayZen</span>
            </div>
        <div class="title">Login to your account</div>

        <form action="/login" method="POST">
            <div class="input">
                <label for="identifier">Enter Email or Username</label>
                <input type="text" id="identifier"
                name="identifier"
                placeholder="Enter email or username" required >
                
            </div>
            <div class="input">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter Password">
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
        <div class="sign-text">
            Don't have an account?
            <a href="{{url_for('signup')}}">Create one!</a>
        </div>
        </div>
    </div>
{% endblock %}

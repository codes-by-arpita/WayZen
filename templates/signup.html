{% extends "layout.html" %}
{% block title %}Signup to WayZen{% endblock %}
{% block css %}<link rel="stylesheet" href="{{url_for('static',filename='css/auth.css')}}">{% endblock %}
{% block body %}
    <div class="overlay">
        <div class="Signup">
            <div class="logo">
            <img src="{{url_for('static',filename='assets/WeyZen_icon.png')}}" alt="WayWen logo">
            <span class="name">WayZen</span>
            </div>
            <div class="title">Signup to your account</div>

            <form action="/signup" method="POST">
                <div class="input">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" placeholder="Enter your Username">
                </div>
                <div class="input">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="Enter your Email">
                </div>
                <div class="input">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="Enter Password">
                </div>
                <button type="submit" class="login-btn">Signup</button>
            </form>
            <div class="sign-text">
                Already have an account?
                <a href="{{url_for('login')}}">Login!</a>
            </div>
        
        </div>
    </div>
{% endblock %}
